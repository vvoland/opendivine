---
name: Action Pin Diff
on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pin-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: vvoland/gha-pin-diff@v1 # v1
