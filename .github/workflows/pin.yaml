---
name: Action Pin Diff
on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pin-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: vvoland/gha-pin-diff@v1 # v1
