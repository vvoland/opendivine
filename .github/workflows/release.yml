---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create release for (e.g., v1.0.0)
        required: true
        type: string

env:
  TAG: ${{ inputs.tag || github.ref_name }}
  REPOSITORY: ${{ github.repository }}

permissions:
  contents: read

jobs:
  build:
    name: Build binaries
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: .exe
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    env:
      NAME: opendivine-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build binary
        run: |
          docker buildx create --use
          docker buildx bake binary \
            --set "*.platform=${{ matrix.os }}/${{ matrix.arch }}" \
            --set "*.cache-from=type=gha,scope=${NAME}" \
            --set "*.cache-to=type=gha,mode=max,scope=${NAME}"
          mv "./_build/opendivine${{ matrix.ext }}" "./_build/${NAME}"
          for file in ./_build/*.json; do
            mv "$file" "./_build/${NAME}.$(basename "$file")"
          done

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: _build/${{ env.NAME }}
          predicate-type: https://slsa.dev/provenance/v0.2
          predicate-path: _build/${{ env.NAME }}.provenance.json

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: _build/${{ env.NAME }}
          predicate-type: https://spdx.dev/Document
          predicate-path: _build/${{ env.NAME }}.sbom.spdx.json

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.NAME }}
          path: _build/*
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(find artifacts -type f | sort)
          printf 'Uploading files:\n%s\n' "${files[*]}"
          gh release create "${{ env.TAG }}" \
            --repo "${{ env.REPOSITORY }}" \
            --title "${{ env.TAG }}" \
            --draft \
            --generate-notes \
            "${files[@]}"
